<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        h3 { margin-top: 0; display: flex; align-items: center; gap: 8px; color: #1a1a1a;}
        p { color: #666; font-size: 14px; line-height: 1.5; }
        .list { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .item { margin-bottom: 10px; font-size: 13px; }
        a { color: #0066cc; text-decoration: none; font-weight: 500;}
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h3>🎓 Discount Radar</h3>
    <p>This extension runs quietly in the background. It will automatically pop up a notification when you visit a website that offers a verified student discount.</p>
    <div class="list">
        <strong>Supported Sites include:</strong>
        <div class="item">🎵 Spotify, Apple Music</div>
        <div class="item">💻 GitHub, JetBrains, Azure</div>
        <div class="item">🎨 Adobe, Figma, Canva</div>
        <div class="item">📱 Apple, Samsung</div>
    </div>
</body>
</html>
